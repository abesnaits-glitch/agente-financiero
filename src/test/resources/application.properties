# ── Datasource: H2 en memoria (reemplaza PostgreSQL para tests) ───────────────
# MODE=PostgreSQL habilita sintaxis PostgreSQL (LIMIT en subqueries, etc.)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Flyway deshabilitado: Hibernate crea el schema desde las entities ─────────
spring.flyway.enabled=false

# ── Stubs para todos los @Value requeridos por el contexto de Spring ──────────
# Sin estos valores, @SpringBootTest falla al resolver las variables de entorno.
anthropic.api.key=test-key-placeholder
twilio.account.sid=ACtest00000000000000000000000000000
twilio.auth.token=test_auth_token_placeholder
twilio.whatsapp.number=+10000000000
mercadopago.access-token=test_mp_token
mercadopago.webhook.secret=test_mp_secret
admin.password=test_admin
app.base-url=http://localhost:8080
