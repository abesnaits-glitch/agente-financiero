anthropic.api.key=${ANTHROPIC_API_KEY}
spring.application.name=agente-financiero
server.port=${PORT:8080}

# PostgreSQL / Supabase (connection pooler via pgbouncer)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false

# Jackson: map camelCase Java fields to/from snake_case JSON
spring.jackson.property-naming-strategy=SNAKE_CASE

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER}

# URL pública del servidor (usada en los links de imagen del dashboard)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Admin panel
admin.password=${ADMIN_PASSWORD}

# MercadoPago
mercadopago.access-token=${MP_ACCESS_TOKEN}
# Secret key from MP Dashboard > Webhooks > secret key (used to verify webhook signatures)
mercadopago.webhook.secret=${MP_WEBHOOK_SECRET:}
# Monto en moneda local (CLP para Chile: ~5000 CLP ≈ 5 USD)
mercadopago.plan.amount=${MP_PLAN_AMOUNT:5000}
mercadopago.plan.currency=${MP_PLAN_CURRENCY:CLP}

# Flyway — database migrations
# baseline-on-migrate=true + baseline-version=0 son CRÍTICOS para la BD existente:
# Le dicen a Flyway "esta BD ya existe con todas sus tablas, no intentes crearlas".
# Flyway crea la tabla flyway_schema_history, inserta la versión 0 como ya aplicada,
# y a partir de ahí aplica V1__, V2__, etc. en orden.
# Sin esto, el primer arranque fallaría porque las tablas ya existen.
spring.flyway.enabled=true
spring.flyway.url=${DB_DIRECT_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.driver-class-name=org.postgresql.Driver
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Pre-Flyway production state (tables created manually in Supabase)
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
