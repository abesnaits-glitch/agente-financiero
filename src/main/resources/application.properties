anthropic.api.key=${ANTHROPIC_API_KEY}
spring.application.name=agente-financiero
server.port=${PORT:8080}

# PostgreSQL / Supabase (connection pooler via pgbouncer)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false

# Jackson: map camelCase Java fields to/from snake_case JSON
spring.jackson.property-naming-strategy=SNAKE_CASE

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER}

# URL pública del servidor (usada en los links de imagen del dashboard)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# MercadoPago
mercadopago.access-token=${MP_ACCESS_TOKEN}
# Monto en moneda local (CLP para Chile: ~5000 CLP ≈ 5 USD)
mercadopago.plan.amount=${MP_PLAN_AMOUNT:5000}
mercadopago.plan.currency=${MP_PLAN_CURRENCY:CLP}
